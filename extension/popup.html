<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Memora</title>

    <link rel="stylesheet" href="popup.css">

</head>

<body>

    <div class="container">

        <h1>🧠 Memora</h1>

        <!-- LOGIN -->

        <div id="loginSection">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <button id="loginBtn">
                Login
            </button>

        </div>

        <!-- DASHBOARD -->

        <div
            id="dashboardSection"
            style="display:none;"
        >

            <h3>Current Page</h3>

            <p id="pageTitle"></p>

            <p id="pageUrl"></p>

            <button id="saveBtn">
                💾 Save Current Page
            </button>

            <p id="status"></p>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="memory.js"></script>
    <script src="popup.js"></script>

</body>

</html>
