<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Memora</title>

    <link rel="stylesheet" href="popup.css">

</head>

<body>

<div class="container">

    <div class="header">

        <div>

            <h1>🧠 Memora</h1>

            <p class="tagline">
                Browse everything.
                <br>
                Forget nothing.
            </p>

        </div>

        <button
            id="logoutBtn"
            title="Logout"
        >
            🚪
        </button>

    </div>

    <!-- LOGIN -->

    <div id="loginSection">

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

    </div>

    <!-- DASHBOARD -->

    <div
        id="dashboardSection"
        style="display:none;"
    >

        <div class="card">

            <span class="label">
                Current Page
            </span>

            <h3 id="pageTitle"></h3>

            <p id="pageUrl"></p>

        </div>

        <button id="saveBtn">

            💾 Save Memory

        </button>

        <p id="status"></p>

    </div>

</div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script src="memory.js"></script>
<script src="popup.js"></script>

</body>

</html>
